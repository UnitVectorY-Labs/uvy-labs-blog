title: UnitVectorY Labs Blog
description: >-
  The official blog for UnitVectorY Labs — sharing insights, deep dives, and
  updates on our open source projects spanning GCP, security, and cloud infrastructure.
baseurl: "/uvy-labs-blog"
url: "https://unitvectory-labs.github.io"

author:
  name: UnitVectorY Labs

# Navigation header links
header_pages:
  - about.md
  - tags.md

# Theme
theme: minima
minima:
  skin: classic
  social_links:
    - { platform: github, user_url: "https://github.com/UnitVectorY-Labs" }

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Build settings
markdown: kramdown
highlighter: rouge

# Pagination
show_excerpts: true

# Collections
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "UnitVectorY Labs"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .bundle/
  - .sass-cache/
  - _site/
